name: Build iOS IPA (signed)

# Produces a distributable, code-signed .ipa.
# Requires these repository secrets (Settings → Secrets and variables → Actions):
#   IOS_CERTIFICATE_BASE64          base64 of your distribution .p12
#   IOS_CERTIFICATE_PASSWORD        password for that .p12
#   IOS_PROVISIONING_PROFILE_BASE64 base64 of the matching .mobileprovision
#   APPLE_TEAM_ID                   your 10-char Apple Team ID
#   IOS_EXPORT_METHOD               app-store | ad-hoc | development | enterprise
# Encode a file to base64:  base64 -i cert.p12 | pbcopy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: cd ios/App && pod install

      - name: Import signing certificate & provisioning profile
        env:
          CERT_B64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERT_PWD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PWD=$(openssl rand -base64 24)

          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "$PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Write ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>${EXPORT_METHOD}</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Archive
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            archive

      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
